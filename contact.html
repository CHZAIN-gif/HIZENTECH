s<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SOVEREIGN INDUSTRIAL SEO ARCHITECTURE -->
    <title>ENGAGEMENT PORTAL | HIZEN TECH UK</title>
    <meta name="description" content="Official engagement portal for Hizen Trading Co. Ltd. Initiate high-tier technical partnerships in AI, Cyber, and Venture Scaling.">
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="logos/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,400;0,600;0,800;1,200;1,400&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #000000;
            --surface: rgba(10, 10, 15, 0.98);
            --accent: #8B5CF6;
            --border: rgba(139, 92, 246, 0.2);
            --text-main: #F8FAFC;
            --text-dim: #64748B;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* --- HOMEPAGE-SYNCED PURPLE KINETIC GRID --- */
        .kinetic-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 95%);
            animation: gridFlow 35s linear infinite;
        }
        @keyframes gridFlow { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }

        .glass-module {
            background: var(--surface);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
        }

        .reveal { opacity: 0; transform: translateY(15px); transition: 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .metadata { font-size: 9px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5em; color: var(--accent); font-weight: 700; }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(139, 92, 246, 0.1) !important;
            color: white !important;
            transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent) !important;
            background: rgba(139, 92, 246, 0.05) !important;
            outline: none;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);
        }

        .form-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: block;
            font-weight: 800;
        }

        .btn-industrial {
            background: white;
            color: black;
            padding: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 11px;
            border-radius: 8px;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-industrial:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <div class="kinetic-bg"></div>

    <!-- Navigation -->
    <nav class="fixed w-full z-[500] px-6 py-8">
        <div class="max-w-[1500px] mx-auto flex justify-between items-center glass-module rounded-2xl px-10 py-4">
            <a href="index.html" class="flex items-center gap-6 group">
                <img src="logos/logo.png" alt="HIZEN" class="h-8 w-auto object-contain">
                <div class="flex flex-col leading-none border-l border-white/10 pl-6 hidden md:flex">
                    <span class="text-xl font-black uppercase">HIZEN</span>
                    <span class="metadata mt-1">Engagement Hub</span>
                </div>
            </a>
            <div class="hidden lg:flex items-center gap-12 text-[10px] font-black uppercase tracking-[0.4em] text-gray-500">
                <a href="index.html" class="hover:text-white transition">Hub Console</a>
                <span class="text-white border-b border-accent pb-1">Direct Intake</span>
            </div>
        </div>
    </nav>

    <main class="pt-60 pb-40 px-10">
        <div class="max-w-[1000px] mx-auto">
            <div class="text-center mb-20 reveal">
                <span class="metadata">Protocol // Project_Initiation</span>
                <h1 class="text-5xl md:text-7xl font-black uppercase mt-6 italic">Secure Engagement.</h1>
                <p class="text-gray-500 mt-8 max-w-2xl mx-auto text-lg font-light italic">Provide your mission specifications below. The Hizen principal board audits every intake for strategic alignment.</p>
            </div>

            <div class="glass-module p-10 md:p-20 rounded-[40px] reveal border-white/5">
                <form id="engagementForm" class="space-y-12">
                    <div class="grid md:grid-cols-2 gap-12">
                        <div class="space-y-2">
                            <label class="form-label">First Name</label>
                            <input type="text" required class="w-full p-4 rounded-lg text-sm font-bold uppercase tracking-widest">
                        </div>
                        <div class="space-y-2">
                            <label class="form-label">Last Name</label>
                            <input type="text" required class="w-full p-4 rounded-lg text-sm font-bold uppercase tracking-widest">
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-12">
                        <div class="space-y-2">
                            <label class="form-label">Company Entity</label>
                            <input type="text" required class="w-full p-4 rounded-lg text-sm font-bold uppercase tracking-widest">
                        </div>
                        <div class="space-y-2">
                            <label class="form-label">Official Email</label>
                            <input type="email" required class="w-full p-4 rounded-lg text-sm font-bold tracking-widest">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="form-label">Required Service Protocol</label>
                        <select required class="w-full p-5 rounded-lg text-[10px] font-black uppercase tracking-[0.2em] cursor-pointer appearance-none">
                            <option value="">SELECT DIVISION...</option>
                            <option>OFFENSIVE CYBERSECURITY (VAPT)</option>
                            <option>AI FRAMEWORK & LLM DESIGN</option>
                            <option>SaaS SYSTEM ARCHITECTURE</option>
                            <option>VENTURE SCALING (AMAZON/TIKTOK)</option>
                            <option>UK LTD / US LLC FORMATION</option>
                            <option>MERCHANT COMPLIANCE AUDIT</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="form-label">Mission Brief & Requirements</label>
                        <textarea required rows="6" class="w-full p-5 rounded-lg text-sm font-medium tracking-wide leading-relaxed" placeholder="Describe the technical scope and desired outcomes..."></textarea>
                    </div>

                    <button type="submit" class="btn-industrial w-full">
                        Dispatch Engagement Brief <i class="fa-solid fa-paper-plane ml-4"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-20 text-center">
        <div class="metadata !text-gray-800 tracking-[1em]">HIZEN TECH </div>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        document.getElementById('engagementForm').onsubmit = (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = 'DISPATCHING...';
            btn.style.opacity = '0.5';
            setTimeout(() => {
                btn.innerHTML = 'MISSION DISPATCHED <i class="fa-solid fa-check ml-4"></i>';
                btn.classList.replace('bg-white', 'bg-green-500');
                btn.classList.add('text-white');
            }, 1500);
        };
    </script>
</body>
</html>
